<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 700" width="560" height="700">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3e7d7"/>
      <stop offset="1" stop-color="#e9dcc9"/>
    </linearGradient>
    <linearGradient id="tube" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fbf6ee"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#efe6d7"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9c8062"/>
      <stop offset="0.5" stop-color="#b89968"/>
      <stop offset="1" stop-color="#8a7053"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-10%" width="160%" height="130%">
      <feDropShadow dx="0" dy="22" stdDeviation="26" flood-color="#9c8062" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="560" height="700" fill="url(#bg)"/>
  <ellipse cx="280" cy="560" rx="170" ry="26" fill="#b89968" opacity="0.18"/>
  <g filter="url(#sh)">
    <!-- cap -->
    <rect x="222" y="92" width="116" height="58" rx="10" fill="url(#cap)"/>
    <!-- tube body -->
    <path d="M210 150 h140 a14 14 0 0 1 14 14 v360 a40 40 0 0 1 -40 40 h-102 a40 40 0 0 1 -40 -40 v-360 a14 14 0 0 1 14 -14 z" fill="url(#tube)" stroke="#e3d6c2" stroke-width="1.5"/>
    <!-- crimp seal bottom hint -->
    <rect x="206" y="556" width="148" height="10" rx="4" fill="#e3d6c2" opacity="0.7"/>
  </g>
  <!-- label texts -->
  <text x="280" y="250" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="13" letter-spacing="8" fill="#b89968">RE : NU</text>
  <text x="280" y="312" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="34" letter-spacing="6" fill="#5b4a3a" font-weight="500">NUDUQUE</text>
  <text x="280" y="352" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="20" letter-spacing="4" fill="#8a7053">aura cream</text>
  <line x1="232" y1="378" x2="328" y2="378" stroke="#d4b88a" stroke-width="1"/>
  <text x="280" y="408" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="12" letter-spacing="3" fill="#9c8775">業務用 仕上げオーラクリーム</text>
  <text x="280" y="430" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="11" letter-spacing="2" fill="#b6a892">100g / AC-11 配合</text>
  <text x="280" y="660" text-anchor="middle" font-family="'Hiragino Kaku Gothic ProN', sans-serif" font-size="11" letter-spacing="2" fill="#b6a892">※ 商品写真は後日差し替え（イメージ）</text>
</svg>
