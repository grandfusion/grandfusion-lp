<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" width="640" height="800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf6f5"/>
      <stop offset="1" stop-color="#f2eae8"/>
    </linearGradient>
    <linearGradient id="tubeBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ede7e6"/>
      <stop offset="0.18" stop-color="#fbf9f9"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="0.84" stop-color="#f6f1f1"/>
      <stop offset="1" stop-color="#e4dcdb"/>
    </linearGradient>
    <linearGradient id="capBase" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e6dedd"/>
      <stop offset="0.5" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ddd4d3"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-15%" width="160%" height="135%">
      <feDropShadow dx="0" dy="26" stdDeviation="30" flood-color="#b59c97" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="640" height="800" fill="url(#bg)"/>
  <ellipse cx="320" cy="712" rx="150" ry="22" fill="#c9b4af" opacity="0.18"/>
  <g filter="url(#soft)">
    <!-- top crimp seal (ribbed) -->
    <rect x="236" y="70" width="168" height="22" rx="3" fill="#eee8e7"/>
    <g stroke="#d8cecd" stroke-width="1">
      <line x1="246" y1="73" x2="246" y2="89"/><line x1="256" y1="73" x2="256" y2="89"/>
      <line x1="266" y1="73" x2="266" y2="89"/><line x1="276" y1="73" x2="276" y2="89"/>
      <line x1="286" y1="73" x2="286" y2="89"/><line x1="296" y1="73" x2="296" y2="89"/>
      <line x1="306" y1="73" x2="306" y2="89"/><line x1="316" y1="73" x2="316" y2="89"/>
      <line x1="326" y1="73" x2="326" y2="89"/><line x1="336" y1="73" x2="336" y2="89"/>
      <line x1="346" y1="73" x2="346" y2="89"/><line x1="356" y1="73" x2="356" y2="89"/>
      <line x1="366" y1="73" x2="366" y2="89"/><line x1="376" y1="73" x2="376" y2="89"/>
      <line x1="386" y1="73" x2="386" y2="89"/><line x1="396" y1="73" x2="396" y2="89"/>
    </g>
    <!-- tube body -->
    <path d="M250 92 h140 q8 0 11 7 l14 470 q1 30 -29 30 h-132 q-30 0 -29 -30 l14 -470 q3 -7 11 -7 z" fill="url(#tubeBody)"/>
    <!-- flip cap base at bottom -->
    <rect x="262" y="596" width="116" height="40" rx="8" fill="url(#capBase)"/>
    <ellipse cx="320" cy="636" rx="58" ry="9" fill="#e7dedd"/>
    <path d="M296 612 q24 -14 48 0" fill="none" stroke="#cfc4c3" stroke-width="1.4"/>
  </g>
  <!-- label -->
  <g fill="#6e6663" font-family="Georgia,'Times New Roman',serif">
    <text x="320" y="246" text-anchor="middle" font-size="34" letter-spacing="2.5" fill="#5f5754">NUDUQUE</text>
  </g>
  <text x="320" y="280" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="19" letter-spacing="2" fill="#8a817e">aura cream</text>
  <line x1="252" y1="306" x2="388" y2="306" stroke="#b7adaa" stroke-width="1"/>
  <text x="320" y="344" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" letter-spacing="0.5" fill="#7c7370">For skin as it should be</text>
  <text x="320" y="404" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" letter-spacing="0.5" fill="#7c7370">Not to cover</text>
  <text x="320" y="428" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" letter-spacing="0.5" fill="#7c7370">but to balance</text>
  <text x="320" y="468" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="15" letter-spacing="0.5" fill="#7c7370">Moisture remains</text>
  <line x1="252" y1="494" x2="388" y2="494" stroke="#b7adaa" stroke-width="1"/>
  <text x="320" y="522" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12.5" letter-spacing="1" fill="#8a817e">NUDUQUE SKIN ARCHITECTURE</text>
  <text x="320" y="544" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="12.5" letter-spacing="0.5" fill="#8a817e">Made in Japan</text>
  <text x="320" y="586" text-anchor="middle" font-family="'Helvetica Neue',Arial,sans-serif" font-size="17" letter-spacing="0.5" fill="#7c7370">100g</text>
</svg>
