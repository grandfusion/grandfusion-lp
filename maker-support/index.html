<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GrandFusion メーカーサポート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   GrandFusion — "Nude Luxe" Design System
   導入商材連動型 会員制プラットフォーム (Mock)
=================================================================== */
:root{
  --nude-50:  oklch(0.985 0.006 70);
  --nude-100: oklch(0.965 0.012 68);
  --nude-200: oklch(0.93 0.018 66);
  --nude-300: oklch(0.88 0.026 60);
  --nude-400: oklch(0.80 0.035 56);
  --nude-500: oklch(0.70 0.040 52);
  --nude-600: oklch(0.58 0.040 48);
  --clay:     oklch(0.62 0.060 50);
  --mocha:    oklch(0.42 0.038 50);
  --espresso: oklch(0.28 0.028 55);
  --ink:      oklch(0.22 0.018 60);
  --gold:     oklch(0.74 0.090 78);
  --gold-deep:oklch(0.62 0.095 70);
  --rose:     oklch(0.74 0.055 30);
  --line:     oklch(0.88 0.018 62);
  --bg:       oklch(0.975 0.010 72);
  --card:     oklch(0.995 0.004 80);
  --ok:       oklch(0.62 0.10 150);
  --warn:     oklch(0.70 0.12 60);
  --shadow:   0 14px 50px -20px oklch(0.4 0.03 55 / 0.35);
  --shadow-sm:0 6px 22px -14px oklch(0.4 0.03 55 / 0.4);
  --serif: "Cormorant Garamond", serif;
  --display: "Jost", "Noto Sans JP", sans-serif;
  --body: "Noto Sans JP", sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--body);color:var(--ink);background:var(--bg);line-height:1.8;font-weight:300;letter-spacing:.02em;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none}
.eyebrow{font-family:var(--display);font-size:.72rem;letter-spacing:.42em;text-transform:uppercase;color:var(--clay);font-weight:500}
.serif{font-family:var(--serif)}
h1,h2,h3{font-weight:400;letter-spacing:.02em;line-height:1.35}
.section{max-width:1180px;margin:0 auto;padding:96px 28px}
.center{text-align:center}
.muted{color:var(--mocha)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5em;font-family:var(--display);font-weight:500;letter-spacing:.12em;font-size:.82rem;text-transform:uppercase;padding:15px 30px;border-radius:999px;transition:.25s;white-space:nowrap}
.btn-primary{background:var(--espresso);color:var(--nude-50)}
.btn-primary:hover{background:var(--ink);transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.btn-gold{background:linear-gradient(120deg,var(--gold),var(--gold-deep));color:var(--espresso)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:var(--shadow-sm)}
.btn-ghost{border:1px solid var(--line);color:var(--mocha)}
.btn-ghost:hover{border-color:var(--clay);color:var(--espresso)}
.btn-sm{padding:9px 18px;font-size:.72rem}
.tag{font-family:var(--display);font-size:.66rem;letter-spacing:.2em;text-transform:uppercase;padding:4px 12px;border-radius:999px;border:1px solid var(--line);color:var(--clay)}

header.nav{position:sticky;top:0;z-index:80;backdrop-filter:blur(14px);background:oklch(0.975 0.01 72 / .82);border-bottom:1px solid var(--line)}
.nav-in{max-width:1180px;margin:0 auto;padding:14px 28px;display:flex;align-items:center;gap:24px}
.brand{font-family:var(--display);font-weight:600;letter-spacing:.22em;font-size:1.05rem}
.brand small{display:block;font-size:.52rem;letter-spacing:.4em;color:var(--clay);font-weight:400}
.nav-links{display:flex;gap:22px;margin-left:auto;align-items:center}
.nav-links a{font-family:var(--display);font-size:.8rem;letter-spacing:.08em;color:var(--mocha);transition:.2s}
.nav-links a:hover{color:var(--espresso)}
.nav-toggle{display:none;margin-left:auto;font-size:1.4rem}
@media(max-width:880px){.nav-links{display:none}.nav-toggle{display:block}
  .nav-links.open{display:flex;position:absolute;top:100%;left:0;right:0;flex-direction:column;background:var(--card);padding:18px 28px;gap:16px;border-bottom:1px solid var(--line)}}

.hero{position:relative;min-height:92vh;display:flex;align-items:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;z-index:0}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(100deg, oklch(0.97 0.01 72 / .96) 0%, oklch(0.95 0.015 70 / .7) 42%, oklch(0.9 0.02 65 / .25) 100%)}
.hero-in{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:0 28px;width:100%}
.hero h1{font-family:var(--serif);font-size:clamp(2.6rem,6vw,4.7rem);font-weight:500;margin:18px 0 22px;line-height:1.18}
.hero p.lead{font-size:1.02rem;color:var(--mocha);max-width:30em;margin-bottom:34px}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap}
.scroll-hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);z-index:2;font-family:var(--display);font-size:.6rem;letter-spacing:.3em;color:var(--clay)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:1px solid var(--line);border-radius:18px;overflow:hidden}
.stat{background:var(--card);padding:34px 18px;text-align:center}
.stat b{font-family:var(--serif);font-size:2.4rem;color:var(--espresso);font-weight:600;display:block}
.stat span{font-size:.78rem;color:var(--mocha)}
@media(max-width:680px){.stats{grid-template-columns:repeat(2,1fr)}}

.sec-head{text-align:center;max-width:46em;margin:0 auto 56px}
.sec-head h2{font-family:var(--serif);font-size:clamp(1.9rem,4vw,2.9rem);font-weight:500;margin:14px 0}
.sec-head p{color:var(--mocha)}

.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
@media(max-width:860px){.grid-3,.grid-2{grid-template-columns:1fr}}
.feature{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:38px 30px;transition:.3s}
.feature:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.feature .num{font-family:var(--serif);font-size:1.4rem;color:var(--gold-deep)}
.feature h3{font-size:1.18rem;margin:10px 0 12px;font-weight:500}
.feature p{font-size:.9rem;color:var(--mocha)}

.prod{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden;transition:.3s;display:flex;flex-direction:column}
.prod:hover{transform:translateY(-4px);box-shadow:var(--shadow)}
.prod .ph{aspect-ratio:4/3;overflow:hidden;background:var(--nude-200)}
.prod .ph img{width:100%;height:100%;object-fit:cover;transition:.5s}
.prod:hover .ph img{transform:scale(1.05)}
.prod .body{padding:24px;display:flex;flex-direction:column;flex:1}
.prod .kw{font-family:var(--display);font-size:.62rem;letter-spacing:.28em;color:var(--clay)}
.prod h3{font-size:1.22rem;margin:6px 0 10px;font-weight:500}
.prod p{font-size:.86rem;color:var(--mocha);flex:1}
.prod .lp-link{margin-top:16px;font-family:var(--display);font-size:.74rem;letter-spacing:.1em;color:var(--espresso);border-bottom:1px solid var(--clay);align-self:flex-start;padding-bottom:2px}

/* unlock-map cards (LPの旧ランク部分の置換) */
.umap{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
@media(max-width:860px){.umap{grid-template-columns:1fr}}
.ucard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px;position:relative;overflow:hidden}
.ucard::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:var(--uc,var(--clay))}
.ucard .typ{font-family:var(--display);font-size:.64rem;letter-spacing:.24em;color:var(--clay)}
.ucard h3{font-size:1.1rem;margin:6px 0 8px;font-weight:500}
.ucard p{font-size:.84rem;color:var(--mocha)}

.cmp{width:100%;border-collapse:collapse;background:var(--card);border-radius:16px;overflow:hidden;border:1px solid var(--line)}
.cmp th,.cmp td{padding:16px 18px;text-align:center;border-bottom:1px solid var(--line);font-size:.88rem}
.cmp th{font-family:var(--display);letter-spacing:.08em;background:var(--nude-100);font-weight:500}
.cmp td:first-child{text-align:left;color:var(--mocha)}
.cmp .yes{color:var(--ok);font-weight:700}
.cmp .no{color:var(--nude-400)}
.cmp tr td:nth-child(2){background:oklch(0.97 0.02 78 / .5)}

.voice{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:32px 28px}
.voice .quote{font-family:var(--serif);font-style:italic;font-size:1.05rem;color:var(--espresso);margin-bottom:18px;line-height:1.7}
.voice .who{display:flex;align-items:center;gap:12px}
.voice .av{width:42px;height:42px;border-radius:999px;background:linear-gradient(135deg,var(--nude-300),var(--clay));display:grid;place-items:center;font-family:var(--serif);color:var(--card);font-size:1.1rem}
.voice .who b{font-size:.9rem;font-weight:500}
.voice .who span{font-size:.74rem;color:var(--mocha);display:block}

.faq-item{background:var(--card);border:1px solid var(--line);border-radius:14px;margin-bottom:12px;overflow:hidden}
.faq-q{width:100%;text-align:left;padding:20px 24px;display:flex;justify-content:space-between;align-items:center;gap:16px;font-size:.95rem;color:var(--espresso)}
.faq-q .ic{font-family:var(--serif);font-size:1.4rem;color:var(--clay);transition:.3s}
.faq-item.open .ic{transform:rotate(45deg)}
.faq-a{max-height:0;overflow:hidden;transition:max-height .35s ease;padding:0 24px}
.faq-item.open .faq-a{max-height:260px;padding:0 24px 22px}
.faq-a p{font-size:.88rem;color:var(--mocha)}

.cta-band{background:linear-gradient(120deg,var(--espresso),var(--mocha));color:var(--nude-50);border-radius:24px;padding:64px 40px;text-align:center}
.cta-band h2{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.6rem);font-weight:500;margin-bottom:14px}
.cta-band p{color:var(--nude-200);margin-bottom:30px}
.cta-band .btn-ghost{border-color:oklch(0.7 0.02 60 / .5);color:var(--nude-100)}
.cta-band .btn-ghost:hover{border-color:var(--nude-100);color:var(--nude-50)}

footer.ft{background:var(--ink);color:var(--nude-200);padding:50px 28px;text-align:center}
footer.ft .brand{color:var(--nude-50);margin-bottom:10px}
footer.ft small{font-size:.72rem;color:var(--nude-400)}

/* ===================== MEMBER AREA ===================== */
.app-shell{display:grid;grid-template-columns:260px 1fr;min-height:100vh}
@media(max-width:900px){.app-shell{grid-template-columns:1fr}}
.side{background:var(--espresso);color:var(--nude-200);padding:26px 18px;position:sticky;top:0;height:100vh;overflow:auto}
@media(max-width:900px){.side{position:static;height:auto}}
.side .brand{color:var(--nude-50);margin-bottom:6px}
.side .me{background:oklch(0.34 0.03 55);border-radius:14px;padding:16px;margin:18px 0 22px}
.side .me .nm{color:var(--nude-50);font-weight:500;font-size:.95rem}
.side .me .salon{font-size:.74rem;color:var(--nude-300)}
.side .me .cnt{display:inline-flex;align-items:center;gap:6px;margin-top:10px;font-family:var(--display);letter-spacing:.1em;font-size:.66rem;padding:5px 12px;border-radius:999px;background:var(--clay);color:var(--nude-50);font-weight:600}
.side nav a{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:10px;font-size:.86rem;color:var(--nude-200);transition:.2s;margin-bottom:3px}
.side nav a:hover{background:oklch(0.34 0.03 55);color:var(--nude-50)}
.side nav a.active{background:var(--clay);color:var(--nude-50)}
.side nav .grp{font-family:var(--display);font-size:.6rem;letter-spacing:.26em;color:var(--nude-400);margin:18px 0 8px;padding:0 14px}
.side .ico{width:18px;text-align:center;opacity:.85}
.main{padding:34px 38px;overflow:auto;background:var(--bg)}
@media(max-width:600px){.main{padding:24px 18px}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.page-head h1{font-family:var(--serif);font-size:2.1rem;font-weight:500}
.page-head p{color:var(--mocha);font-size:.9rem}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px}
.kpi b{font-family:var(--serif);font-size:1.9rem;color:var(--espresso);display:block}
.kpi span{font-size:.78rem;color:var(--mocha)}

.bar{height:12px;border-radius:999px;background:var(--nude-200);overflow:hidden}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--clay),var(--gold));border-radius:999px;transition:width .8s}

.grouphead{display:flex;align-items:center;gap:12px;margin:34px 0 16px}
.grouphead h2{font-family:var(--serif);font-size:1.45rem;font-weight:500}
.grouphead .ct{font-family:var(--display);font-size:.66rem;letter-spacing:.14em;color:var(--clay);background:var(--nude-100);padding:3px 10px;border-radius:999px}
.grouphead .ln{flex:1;height:1px;background:var(--line)}

.courses{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:20px}
.course{background:var(--card);border:1px solid var(--line);border-radius:16px;overflow:hidden;position:relative;transition:.3s}
.course:hover{transform:translateY(-3px);box-shadow:var(--shadow-sm)}
.course .thumb{aspect-ratio:16/9;background:linear-gradient(135deg,var(--nude-300),var(--nude-500));position:relative;display:grid;place-items:center;overflow:hidden}
.course .thumb img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.course .thumb .play{width:46px;height:46px;border-radius:999px;background:oklch(1 0 0 / .9);display:grid;place-items:center;color:var(--espresso);font-size:1rem;padding-left:3px;position:relative;z-index:2}
.course .thumb .badge2{position:absolute;top:10px;left:10px;z-index:2;font-family:var(--display);font-size:.6rem;letter-spacing:.14em;padding:3px 9px;border-radius:999px;background:oklch(0 0 0 / .5);color:#fff}
.course .meta{padding:18px}
.course .cat{font-family:var(--display);font-size:.62rem;letter-spacing:.2em;color:var(--clay)}
.course h3{font-size:1rem;margin:6px 0;font-weight:500;line-height:1.4}
.course .dur{font-size:.74rem;color:var(--mocha)}
.course.locked .thumb{filter:grayscale(.7) brightness(.82)}
.course .lock-ov{position:absolute;inset:0;background:oklch(0.22 0.02 60 / .62);display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--nude-100);text-align:center;padding:14px;z-index:3}
.course.locked .lock-ov{display:flex}
.course .lock-ov .lk{font-size:1.4rem}
.course .lock-ov small{font-size:.72rem;line-height:1.5}
.course .lock-ov a{margin-top:4px;font-family:var(--display);font-size:.66rem;letter-spacing:.1em;border-bottom:1px solid var(--gold);color:var(--gold);padding-bottom:1px}

.panel{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:28px 30px;margin-bottom:22px}
.panel h2{font-family:var(--serif);font-size:1.4rem;font-weight:500;margin-bottom:16px}
.tbl{width:100%;border-collapse:collapse}
.tbl th,.tbl td{padding:13px 14px;border-bottom:1px solid var(--line);text-align:left;font-size:.86rem}
.tbl th{font-family:var(--display);font-size:.68rem;letter-spacing:.12em;color:var(--clay);text-transform:uppercase}
.tbl tr:hover td{background:var(--nude-50)}
.badge{font-family:var(--display);font-size:.62rem;letter-spacing:.1em;padding:3px 10px;border-radius:999px}
.badge.ok{background:oklch(0.92 0.06 150);color:var(--ok)}
.badge.wait{background:oklch(0.94 0.05 80);color:var(--gold-deep)}
.badge.muted{background:var(--nude-200);color:var(--mocha)}

.news-item{display:flex;gap:18px;padding:20px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.news-item .date{font-family:var(--display);font-size:.74rem;color:var(--clay);min-width:92px;letter-spacing:.06em}
.news-item h3{font-size:1rem;font-weight:500;margin-bottom:4px}
.news-item p{font-size:.84rem;color:var(--mocha)}

.login-wrap{min-height:100vh;display:grid;place-items:center;padding:30px;background:linear-gradient(120deg,var(--nude-100),var(--nude-300))}
.login-card{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:48px 42px;max-width:420px;width:100%}
.login-card .brand{text-align:center;margin-bottom:8px}
.login-card h1{font-family:var(--serif);font-size:1.7rem;text-align:center;font-weight:500;margin-bottom:6px}
.login-card p.sub{text-align:center;color:var(--mocha);font-size:.84rem;margin-bottom:26px}
.field{margin-bottom:16px}
.field label{font-family:var(--display);font-size:.7rem;letter-spacing:.1em;color:var(--clay);display:block;margin-bottom:6px}
.field input,.field select{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:10px;font-family:var(--body);font-size:.9rem;background:var(--nude-50)}
.field input:focus,.field select:focus{outline:none;border-color:var(--clay)}
.demo-note{background:var(--nude-100);border:1px dashed var(--line);border-radius:12px;padding:14px 16px;font-size:.78rem;color:var(--mocha);margin-top:18px}
.demo-note b{color:var(--espresso)}

.modal{position:fixed;inset:0;z-index:200;background:oklch(0.2 0.02 60 / .72);display:none;place-items:center;padding:24px;backdrop-filter:blur(4px)}
.modal.show{display:grid}
.modal-card{background:var(--card);border-radius:20px;max-width:760px;width:100%;overflow:hidden;box-shadow:var(--shadow)}
.modal-card .vid{aspect-ratio:16/9;background:linear-gradient(135deg,var(--espresso),var(--mocha));display:grid;place-items:center;color:var(--nude-200);text-align:center;gap:8px;flex-direction:column}
.modal-card .vid .pl{width:60px;height:60px;border-radius:999px;background:oklch(1 0 0 / .15);display:grid;place-items:center;font-size:1.4rem}
.modal-card .mbody{padding:26px 30px}
.modal-card .mbody h2{font-family:var(--serif);font-size:1.4rem;font-weight:500;margin-bottom:6px}
.modal-card .mbody p{font-size:.86rem;color:var(--mocha)}
.modal-card .close{position:absolute;top:16px;right:20px;color:#fff;font-size:1.6rem;z-index:2}

.back-link{font-family:var(--display);font-size:.74rem;letter-spacing:.1em;color:var(--clay);margin-bottom:18px;display:inline-block}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="root"></div>

<div class="modal" id="modal">
  <div class="modal-card" style="position:relative">
    <button class="close" onclick="closeModal()">&times;</button>
    <div class="vid"><div class="pl">&#9658;</div><span style="font-family:var(--display);letter-spacing:.2em;font-size:.7rem">HD VIDEO STREAM (DEMO)</span></div>
    <div class="mbody"><h2 id="mtitle"></h2><p id="mdesc"></p></div>
  </div>
</div>

<script>
/* ===================================================================
   MOCK DATA  —  解放は「導入商材・マシン・有料講座」連動 (ランク制度なし)
=================================================================== */
const IMG = {
  hero:"https://d2xsxph8kpxj0f.cloudfront.net/310519663474302753/mxgQY3saBZok99TjGMgj4n/nuduque-hero-products_6bdc7be0.jpg",
  aura:"https://d2xsxph8kpxj0f.cloudfront.net/310519663474302753/mxgQY3saBZok99TjGMgj4n/nuduque-aura-pack_bf792d56.jpg",
  repair:"https://d2xsxph8kpxj0f.cloudfront.net/310519663474302753/mxgQY3saBZok99TjGMgj4n/nuduque-repair-cream_e39c5659.webp",
  protein:"https://d2xsxph8kpxj0f.cloudfront.net/310519663474302753/mxgQY3saBZok99TjGMgj4n/nuduque-protein_a44a55a2.jpg",
  skinbank:"https://d2xsxph8kpxj0f.cloudfront.net/310519663474302753/mxgQY3saBZok99TjGMgj4n/nuduque-skinbank_33abd3db.jpg",

function courseCard(co, c){
  const open=isUnlocked(co,c);
  const lp=keyLp(co.key);
  const reason = co.type==="paid"
    ? `「${keyName(co.key)}」購入で解放`
    : `「${keyName(co.key)}」導入で解放`;
  return `<div class="course ${open?'':'locked'}" ${open?`onclick="openCourse('${co.title.replace(/'/g,'')}','${co.dur}')" style="cursor:pointer"`:''}>
    <div class="thumb">${co.img?`<img src="${co.img}" alt="">`:''}
      <span class="badge2">${co.type==='free'?'無料':co.type==='paid'?'有料講座':co.type==='machine'?'マシン':'商材'}</span>
      ${open?'<div class="play">▶</div>':''}
      <div class="lock-ov"><span class="lk">🔒</span><small>${reason}</small>
        ${lp?`<a href="${lp}" target="_blank" onclick="event.stopPropagation()">商材LPを見る →</a>`:''}</div>
    </div>
    <div class="meta"><span class="cat">${co.cat}</span><h3>${co.title}</h3><span class="dur">▷ ${co.dur}</span></div></div>`;
}

route("/courses", () => {

});
